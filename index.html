<!doctype html>
<html>
<head>
  <title>ResoFit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAV -->
<nav>
  <a href="/">Home</a>
  <a href="/martial-x/">Martial X</a>
  <a href="/elite-ng/">Elite NG</a>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>RESOFIT</h1>
  <p>Fitness • Combat • Transformation</p>

  <a class="btn" href="/martial-x/">Start Martial X – ₦1,000</a>
</div>

<!-- FEATURES -->
<div class="grid">

  <div class="card">
    <h3>🥋 Martial X</h3>
    <p>Combat fitness & fat loss system</p>
  </div>

  <div class="card">
    <h3>💼 Elite NG</h3>
    <p>High-performance coaching</p>
  </div>

</div>

<!-- 🤖 AI COACH B2K -->
<div style="max-width:700px;margin:40px auto;padding:20px;background:#111;border-radius:15px">

  <h2 style="text-align:center;color:gold">🤖 coachB2K AI Coach</h2>

  <div id="chatBox" style="height:220px;overflow:auto;background:#000;padding:10px;border-radius:10px;margin-bottom:10px">
    <p><b>coachB2K:</b> 👋 Welcome. Tell me your goal (fat loss, muscle gain, martial fitness).</p>
  </div>

  <input 
    id="userInput" 
    placeholder="Type your goal..." 
    style="width:100%;padding:12px;border:none;border-radius:8px"
  >

  <button 
    onclick="sendMessage()" 
    style="margin-top:10px;width:100%;padding:14px;background:gold;border:none;font-weight:bold;border-radius:10px"
  >
    Send
  </button>

</div>

<!-- SCRIPT -->
<script src="/script.js"></script>

</body>
</html>
