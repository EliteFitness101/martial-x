<div class="calculator-box" style="background:#1a1a1a; padding:25px; border-radius:20px; border:1px solid #333;">
  <h2 style="color:#00ff88">GET YOUR 90-DAY BLUEPRINT</h2>
  <p>Input your stats to calculate your protein requirements.</p>

  <form id="resetForm" style="display:flex; flex-direction:column; gap:15px;">
    <input type="number" id="weight" placeholder="Weight (kg)" required style="padding:12px; border-radius:8px; border:none;">
    <input type="number" id="height" placeholder="Height (cm)" required style="padding:12px; border-radius:8px; border:none;">
    
    <button type="button" onclick="calculateStats()" class="btn" style="background:#00ff88; color:#000; font-weight:bold;">
      GENERATE MY RESET PLAN
    </button>
  </form>

  <div id="resultArea" style="display:none; margin-top:20px; padding-top:20px; border-top:1px solid #444;">
    <p>Target Daily Protein: <span id="protein" style="color:#00ff88; font-weight:bold;">--</span>g</p>
    <p>Daily Caloric Ceiling: <span id="calories" style="color:#00ff88; font-weight:bold;">--</span> kcal</p>
    
    <a href="https://paystack.com/buy/meal-plan-reset" class="btn" style="display:block; margin-top:15px; text-align:center;">
      Unlock Full 90-Day Plan (₦1,000)
    </a>
  </div>
</div>

<script>
function calculateStats() {
  const w = document.getElementById('weight').value;
  if(!w) return;
  
  // High-Protein Logic: 2g per kg of bodyweight
  document.getElementById('protein').innerText = w * 2;
  document.getElementById('calories').innerText = Math.round(w * 28);
  document.getElementById('resultArea').style.display = 'block';
}
</script>
